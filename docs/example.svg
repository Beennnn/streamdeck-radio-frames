<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="20" fill="#0d0f14"/>

  <text x="440" y="46" text-anchor="middle" fill="#94A3B8" font-size="21" font-weight="600">
    Three ways to flag the selected key — keep the title, add the marker
  </text>

  <!-- ===== Key 1: FRAME (green) ===== -->
  <g>
    <rect x="90" y="88" width="180" height="180" rx="26" fill="#181b22"/>
    <rect x="101" y="99" width="158" height="158" rx="22" fill="none" stroke="#000000" stroke-opacity="0.38" stroke-width="17"/>
    <rect x="101" y="99" width="158" height="158" rx="22" fill="none" stroke="#22C55E" stroke-width="11"/>
    <rect x="108" y="106" width="144" height="144" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>
    <text x="180" y="190" text-anchor="middle" fill="#F8FAFC" font-size="29" font-weight="700">RHODES</text>
    <text x="180" y="308" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="600">Frame</text>
    <text x="180" y="332" text-anchor="middle" fill="#64748B" font-size="15">bold full border</text>
  </g>

  <!-- ===== Key 2: CORNER NOTCH (cyan) ===== -->
  <g>
    <rect x="350" y="88" width="180" height="180" rx="26" fill="#181b22"/>
    <!-- four L brackets, inset 16, arm 42, scaled into the 180 key from x=350,y=88 -->
    <g fill="none" stroke="#22D3EE" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M366 146 L366 104 L408 104"/>
      <path d="M472 104 L514 104 L514 146"/>
      <path d="M514 210 L514 252 L472 252"/>
      <path d="M408 252 L366 252 L366 210"/>
    </g>
    <text x="440" y="190" text-anchor="middle" fill="#F8FAFC" font-size="30" font-weight="700">CLAV</text>
    <text x="440" y="308" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="600">Corner Notch</text>
    <text x="440" y="332" text-anchor="middle" fill="#64748B" font-size="15">light reticle</text>
  </g>

  <!-- ===== Key 3: CORNER BEVEL right (amber) ===== -->
  <g>
    <rect x="610" y="88" width="180" height="180" rx="26" fill="#181b22"/>
    <!-- clip the dog-ear to the rounded key so it hugs the corner -->
    <clipPath id="k3"><rect x="610" y="88" width="180" height="180" rx="26"/></clipPath>
    <g clip-path="url(#k3)">
      <path d="M790 88 L724 88 L790 154 Z" fill="#F59E0B"/>
      <path d="M724 88 L790 154" fill="none" stroke="#000000" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="700" y="190" text-anchor="middle" fill="#F8FAFC" font-size="29" font-weight="700">ORGAN</text>
    <text x="700" y="308" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="600">Corner Bevel</text>
    <text x="700" y="332" text-anchor="middle" fill="#64748B" font-size="15">funk-style flag</text>
  </g>
</svg>
