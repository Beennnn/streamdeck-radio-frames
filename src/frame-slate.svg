<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <!-- dark halo so the frame stays visible on light key backgrounds -->
  <rect x="11" y="11" width="122" height="122" rx="26"
        fill="none" stroke="#000000" stroke-opacity="0.38" stroke-width="17"/>
  <!-- coloured selection frame -->
  <rect x="11" y="11" width="122" height="122" rx="26"
        fill="none" stroke="#94A3B8" stroke-width="11"/>
  <!-- faint inner highlight for a lit-edge feel -->
  <rect x="19.5" y="19.5" width="105.0" height="105.0" rx="22"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>
</svg>
